services:
  db:
    image: postgres:16-alpine
    container_name: sports-calendar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_calendar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sports_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-calendar-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sports_calendar?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
