<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Event - SportCalendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">Sport<span>Calendar</span></a>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Events</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Stats</a></li>
            <li><a href="#">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-header">
        <h1>Add New Event</h1>
        <a href="index.html" class="btn btn-secondary">Back to Events</a>
      </div>

      <div class="form-container">
        <form id="add-event-form">
          <div id="error-message" class="error-msg" style="display: none;"></div>

          <div class="form-row">
            <div class="form-group">
              <label for="event_date">Date *</label>
              <input type="date" id="event_date" name="event_date" required />
            </div>
            <div class="form-group">
              <label for="event_time">Time *</label>
              <input type="time" id="event_time" name="event_time" required />
            </div>
          </div>

          <div class="form-group">
            <label for="sportId">Sport *</label>
            <select id="sportId" name="sportId" required>
              <option value="">Select a sport</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="homeTeamId">Home Team *</label>
              <select id="homeTeamId" name="homeTeamId" required disabled>
                <option value="">Select sport first</option>
              </select>
            </div>
            <div class="form-group">
              <label for="awayTeamId">Away Team *</label>
              <select id="awayTeamId" name="awayTeamId" required disabled>
                <option value="">Select sport first</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="venueId">Venue</label>
            <select id="venueId" name="venueId">
              <option value="">Select a venue (optional)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="Enter event details..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create Event</button>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 SportCalendar</p>
    </footer>

    <script src="config.js"></script>
    <script src="add-event.js"></script>
  </body>
</html>
