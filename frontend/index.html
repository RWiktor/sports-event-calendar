<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportCalendar - Sports Events</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="nav-container">
        <a href="#" class="logo">Sport<span>Calendar</span></a>
        <nav>
          <ul class="nav-links">
            <li><a href="#">Events</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Stats</a></li>
            <li><a href="#">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-header">
        <h1 id="page-title">Upcoming events</h1>
        <a href="add-event.html" class="btn btn-primary">Add Event</a>
      </div>

      <div class="filters">
        <div class="filter-field">
          <label for="range-filter">Show:</label>
          <select id="range-filter">
            <option value="upcoming" selected>Upcoming</option>
            <option value="past">Past</option>
            <option value="all">All</option>
          </select>
        </div>
        <div class="filter-field">
          <label for="sport-filter">Sport:</label>
          <select id="sport-filter">
            <option value="">All sports</option>
          </select>
        </div>
      </div>

      <div id="events-container" class="events-grid">
        <!-- Events will be rendered here dynamically -->
        <div class="loading">Loading events...</div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 SportCalendar</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
